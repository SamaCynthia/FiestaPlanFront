<header
  role="banner"
  class="glass-panel sticky top-0 z-50 px-6 py-4 md:px-12 flex items-center justify-between"
>
  <a routerLink="/" class="flex items-center gap-2">
    <span
      class="text-2xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent tracking-tight"
    >
      FiestaPlan
    </span>
  </a>

  <nav role="navigation" aria-label="Menú principal" class="flex items-center gap-4">
    @if (!estaAutenticado()) {
      <a
        routerLink="/login"
        class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white transition-colors duration-200 focus-visible:outline-none"
      >
        Iniciar Sesión
      </a>

      <a
        routerLink="/registro"
        class="glass-panel px-4 py-2 text-sm font-medium text-white hover:bg-white/10 hover:border-white/20 transition-all duration-200 focus-visible:outline-none"
      >
        Registrarse
      </a>
    } @else {
      <a
        routerLink="/"
        class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white transition-colors duration-200 focus-visible:outline-none"
      >
        Inicio
      </a>

      @if (rolActual() === 'admin' || rolActual() === 'moderador') {
        <a
          routerLink="/admin"
          class="px-4 py-2 text-sm font-medium text-accent hover:text-pink-400 transition-colors duration-200 focus-visible:outline-none"
        >
          Panel de Admin
        </a>
      }

      <a
        routerLink="/perfil"
        class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white transition-colors duration-200 focus-visible:outline-none"
      >
        Mi Perfil
      </a>

      <a
        routerLink="/mi-actividad"
        class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white transition-colors duration-200 focus-visible:outline-none"
      >
        Mi Actividad
      </a>

      <button
        (click)="logout()"
        class="glass-panel px-4 py-2 text-sm font-medium text-white hover:bg-rose-500/20 hover:border-rose-500/30 transition-all duration-200 focus-visible:outline-none cursor-pointer"
      >
        Cerrar Sesión
      </button>
    }
  </nav>
</header>
