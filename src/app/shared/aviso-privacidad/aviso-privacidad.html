@if (visible) {
  <div
    class="fixed inset-0 z-[100] flex items-center justify-center px-4 bg-black/70 backdrop-blur-sm"
    (click)="onCerrar()"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-aviso-titulo"
  >
    <div
      class="glass-panel w-full max-w-2xl max-h-[85vh] overflow-y-auto rounded-2xl p-6 md:p-8"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-start justify-between mb-6">
        <h2 id="modal-aviso-titulo" class="text-xl md:text-2xl font-extrabold text-white">
          Aviso de Privacidad
        </h2>
        <button
          type="button"
          (click)="onCerrar()"
          aria-label="Cerrar aviso de privacidad"
          class="text-zinc-400 hover:text-white transition-colors duration-200 text-2xl leading-none px-2"
        >
          &times;
        </button>
      </div>

      <app-aviso-privacidad-content />

      <div class="flex justify-end gap-3 mt-8">
        <button
          type="button"
          (click)="onCerrar()"
          class="px-5 py-2.5 text-sm font-medium text-zinc-300 hover:text-white transition-colors duration-200"
        >
          Cerrar
        </button>
        @if (mostrarBotonAceptar) {
          <button
            type="button"
            (click)="onAceptar()"
            class="px-5 py-2.5 bg-gradient-to-r from-primary to-accent hover:from-primary-hover hover:to-accent text-white text-sm font-semibold rounded-xl transition-all duration-200"
          >
            Entendido, acepto
          </button>
        }
      </div>
    </div>
  </div>
}
